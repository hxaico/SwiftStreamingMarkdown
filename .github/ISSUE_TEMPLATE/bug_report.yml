name: Bug report
description: Report a renderer, parser, demo, or packaging issue.
title: "[Bug]: "
labels:
  - bug
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: markdown
    attributes:
      label: Minimal markdown input
      description: Paste the smallest markdown sample that reproduces the issue.
      render: markdown
  - type: dropdown
    id: platform
    attributes:
      label: Platform
      options:
        - iOS
        - Docs or packaging
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    id: validation
    attributes:
      label: Validation
      description: Include commands, versions, logs, screenshots, or fixture names when useful.
